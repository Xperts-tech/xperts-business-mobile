<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Xperts Xpress logo icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#07111f"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7CFF6B"/>
      <stop offset="0.5" stop-color="#10B981"/>
      <stop offset="1" stop-color="#087F5B"/>
    </linearGradient>
    <linearGradient id="white" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#22C55E" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect x="82" y="82" width="860" height="860" rx="188" fill="none" stroke="url(#green)" stroke-width="34" opacity="0.95"/>
  <g filter="url(#shadow)">
    <!-- Left green speed wing -->
    <path d="M178 258 H430 L543 433 L390 433 Z" fill="url(#green)"/>
    <path d="M176 766 H398 L547 545 H393 Z" fill="url(#green)"/>
    <!-- Center cut / motion slash -->
    <path d="M298 764 L684 258 H812 L424 766 Z" fill="url(#white)"/>
    <!-- Right white wing -->
    <path d="M615 435 L814 258 H682 L522 435 Z" fill="url(#white)" opacity="0.97"/>
    <path d="M606 591 L792 766 H653 L520 590 Z" fill="url(#white)" opacity="0.97"/>
    <!-- Green accent slash -->
    <path d="M272 765 L652 258 H700 L319 766 Z" fill="#22C55E" opacity="0.36"/>
  </g>
  <path d="M198 828 H826" stroke="#22C55E" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
</svg>
